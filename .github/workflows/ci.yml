name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            symfony: '6.4.*'
          - php: '8.2'
            symfony: '7.4.*'
          - php: '8.4'
            symfony: '8.0.*'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Set Symfony version
        run: |
          composer require --no-update \
            symfony/config:${{ matrix.symfony }} \
            symfony/console:${{ matrix.symfony }} \
            symfony/dependency-injection:${{ matrix.symfony }} \
            symfony/filesystem:${{ matrix.symfony }} \
            symfony/finder:${{ matrix.symfony }} \
            symfony/translation:${{ matrix.symfony }} \
            symfony/yaml:${{ matrix.symfony }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Validate composer.json
        run: composer validate --strict --no-check-lock

      - name: Run tests
        run: ./vendor/bin/simple-phpunit
